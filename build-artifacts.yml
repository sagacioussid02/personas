name: Build Artifacts

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate-python-deps:
    name: Validate Python Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install pip-compile
        run: pip install pip-compile
      
      - name: Generate requirements.txt from pyproject.toml
        run: |
          cd backend
          pip-compile pyproject.toml -o requirements.txt.generated
      
      - name: Compare generated requirements.txt with committed version
        run: |
          cd backend
          if ! diff -u requirements.txt requirements.txt.generated; then
            echo "ERROR: requirements.txt does not match generated output from pyproject.toml"
            echo "Run: cd backend && pip-compile pyproject.toml"
            exit 1
          fi
          rm requirements.txt.generated

  build-backend:
    name: Build Backend (Lambda)
    runs-on: ubuntu-latest
    needs: validate-python-deps
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Create virtual environment
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run backend tests
        run: |
          cd backend
          source venv/bin/activate
          pytest -v
      
      - name: Run linting
        run: |
          cd backend
          source venv/bin/activate
          ruff check .
      
      - name: Run type checking
        run: |
          cd backend
          source venv/bin/activate
          mypy server
      
      - name: Build Lambda artifact
        run: |
          cd backend
          source venv/bin/activate
          mkdir -p build
          pip install -r requirements.txt -t build/
          cp -r server build/
          cd build && zip -r ../lambda-function.zip . && cd ..
          ls -lh lambda-function.zip

  build-frontend:
    name: Build Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies with npm ci (enforces lock file)
        run: |
          cd frontend
          npm ci
      
      - name: Run linting
        run: |
          cd frontend
          npm run lint
      
      - name: Run type checking
        run: |
          cd frontend
          npm run type-check
      
      - name: Run tests
        run: |
          cd frontend
          npm test -- --passWithNoTests
      
      - name: Build Next.js app
        run: |
          cd frontend
          npm run build
      
      - name: Verify build artifacts
        run: |
          cd frontend
          test -d .next || (echo "ERROR: Next.js build failed" && exit 1)
          echo "Frontend build successful"

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [validate-python-deps, build-backend, build-frontend]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.validate-python-deps.result }}" != "success" ]]; then
            echo "❌ Python dependency validation failed"
            exit 1
          fi
          if [[ "${{ needs.build-backend.result }}" != "success" ]]; then
            echo "❌ Backend build failed"
            exit 1
          fi
          if [[ "${{ needs.build-frontend.result }}" != "success" ]]; then
            echo "❌ Frontend build failed"
            exit 1
          fi
          echo "✅ All builds passed"
