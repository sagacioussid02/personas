[project]
name = "twin-backend"
version = "1.0.0"
description = "FastAPI backend for Personality Twin"
requires-python = ">=3.12"

dependencies = [
    "fastapi==0.104.1",
    "uvicorn[standard]==0.24.0",
    "python-dotenv==1.0.0",
    "pydantic==2.5.0",
    "pydantic-settings==2.1.0",
    "boto3==1.34.0",
    "python-jose[cryptography]==3.3.0",
    "PyJWT==2.8.1",
    "requests==2.31.0",
    "httpx==0.25.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
resolution = "highest"
