[project]
name = "twin-backend"
version = "0.1.0"
description = "FastAPI backend for Personality Twin"
requires-python = ">=3.12"
authors = [{name = "Twin Team"}]

dependencies = [
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "python-dotenv>=1.0.0",
    "boto3>=1.28.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "pyjwt>=2.8.0",
    "httpx>=0.25.0",
    "starlette>=1.0.1",
]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
