[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "twin-backend"
version = "1.0.0"
description = "FastAPI backend for Personality Twin"
requires-python = ">=3.12"
authors = [{name = "Personality Twin Team"}]
license = {text = "MIT"}

dependencies = [
    "fastapi==0.104.1",
    "uvicorn[standard]==0.24.0",
    "pydantic==2.5.0",
    "pydantic-settings==2.1.0",
    "python-dotenv==1.0.0",
    "boto3==1.29.7",
    "botocore==1.32.7",
    "httpx==0.25.1",
    "python-jose[cryptography]==3.3.0",
    "PyJWT==2.8.1",
    "cryptography==41.0.7",
    "requests==2.31.0",
    "aiofiles==23.2.1",
    "python-multipart==0.0.6",
]

[project.optional-dependencies]
dev = [
    "pytest==7.4.3",
    "pytest-asyncio==0.21.1",
    "pytest-cov==4.1.0",
    "black==23.12.0",
    "isort==5.13.2",
    "flake8==6.1.0",
    "mypy==1.7.1",
    "types-requests==2.31.0.10",
    "types-aiofiles==23.2.0.20231219",
]

[tool.setuptools]
packages = ["server"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
