[project]
name = "backend"
version = "0.1.0"
description = "FastAPI backend for Personality Twin"
requires-python = ">=3.12"
authors = [{name = "Sidd", email = "sidd@example.com"}]

dependencies = [
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "python-dotenv>=1.0.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "boto3>=1.28.0",
    "python-jose[cryptography]>=3.3.0",
    "passlib[bcrypt]>=1.7.4",
    "python-multipart>=0.0.6",
    "httpx>=0.25.0",
    "aiofiles>=23.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
# Exclude the backend package itself from being exported as an editable dependency
# The backend code is deployed directly in Lambda, not as an installed package
managed = true
