name: Security Scan

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/security-scan.yml'

concurrency:
  group: security-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/security-scan.yml'
            frontend:
              - 'frontend/**'

  python-security:
    name: Python — Bandit + pip-audit
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit SAST scan
        run: |
          bandit -r backend/ \
            --exclude backend/__pycache__,backend/.venv,backend/lambda-package \
            -f json -o bandit-report.json || true
          bandit -r backend/ \
            --exclude backend/__pycache__,backend/.venv,backend/lambda-package \
            -ll  # print high/medium findings to console

      - name: pip-audit dependency scan
        working-directory: backend
        run: |
          uv export --frozen --no-dev --format requirements-txt --no-emit-project --no-editable --no-hashes > /tmp/requirements.txt
          pip-audit -r /tmp/requirements.txt --format json -o ../pip-audit-report.json || true
          pip-audit -r /tmp/requirements.txt \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln PYSEC-2026-1325  # ecdsa timing side-channel: no fix released (maintainers won't patch pure-Python ECDSA); transitive via python-jose, unused since Clerk JWTs are RS256-only

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: python-security-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  node-security:
    name: Node — npm audit
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit
        working-directory: frontend
        run: |
          npm audit --audit-level=high --json > ../npm-audit-report.json || true
          npm audit --audit-level=high

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: node-security-report
          path: npm-audit-report.json
